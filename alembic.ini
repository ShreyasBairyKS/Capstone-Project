# alembic.ini — Alembic database migration configuration for VisionFood QAI
# Run migrations: alembic upgrade head
# Auto-generate migration: alembic revision --autogenerate -m "description"

[alembic]
script_location = database/migrations
prepend_sys_path = .
version_path_separator = os

# Database URL is loaded from the environment via env.py
# Do NOT set sqlalchemy.url here — it would expose credentials in version control
sqlalchemy.url =

[post_write_hooks]
# Uncomment to auto-format generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
