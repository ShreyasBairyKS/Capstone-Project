# VisionFood QAI — SKU Profile: Standard 330ml Aluminium Can
sku_id: can_330ml
sku_name: "Standard 330ml Aluminium Beverage Can"
product_category: beverage

class_risk_overrides:
  surface_contamination: 0.95   # Slightly lower than glass — enclosed product
  improper_filling: 0.75
  packaging_damage: 0.90        # Dents/cracks on aluminium = structural failure
  label_misalignment: 0.25      # Printed label — cosmetic only

rejection_area_thresholds:
  surface_contamination: 0.05
  improper_filling: 0.12
  packaging_damage: 0.08        # Small dent still causes seal failure
  label_misalignment: 0.40

max_remediation_attempts: 1     # Aluminium — repack is harder, lower tolerance
preferred_stations:
  label_misalignment: A
  improper_filling: B
  packaging_damage: C
  surface_contamination: C

# --- Collaborator A profile-manager fields ---
product_sub_type: rigid_can
container_contents: liquid

# Fill-level inspection (not feasible for opaque aluminium cans)
fill_level_detectable: false

# Surface contamination acceptance threshold (fraction of visible area)
surface_contamination_threshold: 0.05

# Label bounding region as [x_min, y_min, x_max, y_max] in normalised (0-1) coords
label_region: [0.05, 0.20, 0.95, 0.80]

# Barcode / QR verification
barcode_verification:
  target_type: QRCODE
  expected_value_field: qr_code

# OCR date fields to locate and validate on the label
ocr_date_fields:
  - name: mfg_date
    format: "DDMMMYYYY"
  - name: expiry_date
    format: "DDMMMYYYY"
