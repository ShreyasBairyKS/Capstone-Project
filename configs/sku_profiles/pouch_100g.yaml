# VisionFood QAI — SKU Profile: 100g Flexible Pouch
sku_id: pouch_100g
sku_name: "100g Flexible Food Pouch"
product_category: food

class_risk_overrides:
  surface_contamination: 1.00
  improper_filling: 0.85        # Weight/volume compliance critical for food
  packaging_damage: 0.80        # Seal failure = contamination risk
  label_misalignment: 0.30

rejection_area_thresholds:
  surface_contamination: 0.02
  improper_filling: 0.10
  packaging_damage: 0.10        # Tighter — seal failures must be caught early
  label_misalignment: 0.35

max_remediation_attempts: 2
preferred_stations:
  label_misalignment: A
  improper_filling: B
  packaging_damage: C
  surface_contamination: C

# --- Collaborator A profile-manager fields ---
product_sub_type: flexible_wrapper
container_contents: solid

# Fill-level inspection (not applicable to flexible pouches)
fill_level_detectable: false

# Surface contamination acceptance threshold (fraction of visible area)
surface_contamination_threshold: 0.06

# Label bounding region as [x_min, y_min, x_max, y_max] in normalised (0-1) coords
label_region: [0.05, 0.05, 0.95, 0.60]

# Barcode / QR verification
barcode_verification:
  target_type: QRCODE
  expected_value_field: qr_code

# OCR date fields to locate and validate on the label
ocr_date_fields:
  - name: mfg_date
    format: "DD/MM/YYYY"
  - name: best_before
    format: "DD/MM/YYYY"
